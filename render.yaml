services:
  - type: web
    name: chatcommerce-bot
    runtime: python
    repo: https://github.com/orchestrator-isa/isa_chatcommerce_bot
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WHATSAPP_TOKEN
        sync: false
      - key: VERIFY_TOKEN
        value: isa_verify_2026
      - key: PHONE_NUMBER_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
