<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Restinga - Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#0f172a;--card:#1e293b;--text:#f8fafc;--acc:#3b82f6;--succ:#10b981}
    body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:20px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:20px}
    .kpi{background:var(--card);padding:15px;border-radius:10px;text-align:center}
    .kpi h3{margin:0 0 5px;font-size:.85em;opacity:.8;text-transform:uppercase}
    .kpi .val{font-size:1.6em;font-weight:bold}
    .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px}
    .chart-card{background:var(--card);padding:15px;border-radius:10px}
    canvas{max-height:220px}
    .btn{background:var(--acc);color:#fff;padding:10px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:600}
    .toggle{display:flex;gap:8px;align-items:center}
    .toggle button{padding:6px 12px;border:none;border-radius:4px;background:#334155;color:#94a3b8;cursor:pointer}
    .toggle button.active{background:var(--succ);color:#fff}
  </style>
</head>
<body>
  <header>
    <h2>📊 Restinga Analytics</h2>
    <div class="toggle">
      <span>Estado:</span>
      <button class="active" onclick="setStatus('normal')">🟢</button>
      <button onclick="setStatus('moderado')">🟡</button>
      <button onclick="setStatus('lleno')">🔴</button>
    </div>
    <!-- Botón que pediste para simular datos a futuro -->
    <button class="btn" onclick="loadMockData()">🔄 Cargar 18 Meses Prueba</button>
  </header>
  <div class="kpi-grid">
    <div class="kpi"><h3>💰 Ventas Totales</h3><div class="val" id="kpi-sales">0 MAD</div></div>
    <div class="kpi"><h3>📦 Pedidos</h3><div class="val" id="kpi-orders">0</div></div>
    <div class="kpi"><h3>👥 Clientes</h3><div class="val" id="kpi-users">0</div></div>
    <div class="kpi"><h3>🏠 Domicilio</h3><div class="val" id="kpi-dom">0%</div></div>
    <div class="kpi"><h3>🍽️ Plato Top</h3><div class="val" id="kpi-top">-</div></div>
  </div>
  <div class="chart-grid">
    <div class="chart-card"><canvas id="c1"></canvas></div>
    <div class="chart-card"><canvas id="c2"></canvas></div>
  </div>
  <script>
    let charts = {};
    const ctx = id => document.getElementById(id).getContext('2d');
    function setStatus(s) {
      fetch('/api/restaurant/status', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})});
    }
    // Función para cargar datos simulados de 18 meses
    function loadMockData() {
      const months = 18, labels = [], sales=[], orders=[];
      const now = new Date();
      for(let i=months-1;i>=0;i--){
        let d = new Date(now.getFullYear(), now.getMonth()-i, 1);
        labels.push(d.toLocaleString('default',{month:'short',year:'2-digit'}));
        let o = Math.floor(Math.random()*250)+80;
        orders.push(o); sales.push(o*(Math.floor(Math.random()*50)+80));
      }
      document.getElementById('kpi-sales').textContent = sales.reduce((a,b)=>a+b,0).toLocaleString()+' MAD';
      document.getElementById('kpi-orders').textContent = orders.reduce((a,b)=>a+b,0).toLocaleString();
      
      const draw = (id,type,data,label,color) => {
        if(charts[id]) charts[id].destroy();
        charts[id] = new Chart(ctx(id), {type, data:{labels, datasets:[{label, data, borderColor:color, backgroundColor:color+'33', tension:.4, fill:true}]}, options:{responsive:true}});
      };
      draw('c1','line',sales,'Ventas (MAD)','#3b82f6');
      draw('c2','bar',orders,'Pedidos','#10b981');
    }
    window.onload = loadMockData;
  </script>
</body>
</html>
