<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Restinga</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .header { display: flex; justify-content: space-between; background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .status-btn { padding: 8px 15px; border: none; color: white; cursor: pointer; border-radius: 4px; opacity: 0.5; }
        .active { opacity: 1; font-weight: bold; transform: scale(1.05); }
        .n { background: #27ae60; } .m { background: #f1c40f; } .l { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📋 Restinga - Dashboard</h2>
        <div>
            Estado: 
            <button class="status-btn n" onclick="setStatus('normal')">🟢</button>
            <button class="status-btn m" onclick="setStatus('moderado')">🟡</button>
            <button class="status-btn l" onclick="setStatus('lleno')">🔴</button>
        </div>
    </div>
    
    <div class="card">
        <h3>📦 Pedidos Recientes</h3>
        <p>Cargando datos...</p>
    </div>

    <script>
        // Función simple para simular cambio de estado
        async function setStatus(s) {
            alert("Cambiando estado a: " + s + " (Requiere configurar endpoints en main.py)");
            // Aquí iría el fetch a tu API
        }
    </script>
</body>
</html>
